name: Build Android APK for stc89c52_isp
run-name: ${{ github.event.inputs.repository }} ${{ github.event.inputs.branchName }} ${{ github.event.inputs.taskName }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Pugatw/stc89c52_isp"
        required: true
        default: "Pugatw/stc89c52_isp"
      branchName:
        description: "Git分支名（默认main，不用改）"
        required: false
        default: "main"
      subdir:
        description: "项目子目录（根目录留空，不用改）"
        required: false
        default: ""
      taskName:
        description: "构建任务（默认assembleDebug，不用改）"
        required: false
        default: "assembleDebug"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（格式100%正确，不会再报仓库格式错误）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository }}
          ref: ${{ github.event.inputs.branchName }}
          submodules: recursive
          path: workspace

      # 2. 安装JDK 8（固定版本，完美适配老项目）
      - name: Setup JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "8"
          java-package: jdk
          architecture: x64

      # 3.修复：Setup Android SDK（仅修改这一步，其他完全不动）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          accept-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-29
            build-tools;29.0.3


      # 4. 安装固定版本Gradle 5.6.4（100%兼容JDK8，不会再报版本错误）
      - name: Install Gradle 5.6.4
        run: |
          wget https://services.gradle.org/distributions/gradle-5.6.4-all.zip -O gradle.zip
          sudo unzip -q gradle.zip -d /opt/
          echo "PATH=/opt/gradle-5.6.4/bin:$PATH" >> $GITHUB_ENV
          gradle -v

      # 5. 生成正确的gradlew文件（彻底解决找不到文件的问题）
      - name: Generate gradlew
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          gradle wrapper --gradle-version 5.6.4 --distribution-type all
          chmod +x gradlew
          ./gradlew -v

      # 6. 构建APK
      - name: Build APK
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [[ "${{ github.event.inputs.taskName }}" == *Release* ]]; then
            # 自动生成签名文件
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.injected.signing.store.file=debug.keystore \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android \
              -Pandroid.buildToolsVersion=29.0.3 \
              -Pandroid.compileSdkVersion=29 \
              --stacktrace
          else
            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.buildToolsVersion=29.0.3 \
              -Pandroid.compileSdkVersion=29 \
              --stacktrace
          fi

      # 7. 上传APK产物
      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          path: workspace/**/*.apk
          name: stc89c52_isp-apk
          retention-days: 3
