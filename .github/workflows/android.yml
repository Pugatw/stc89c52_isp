name: Build Android APK for stc89c52_isp
run-name: ${{ github.event.inputs.repository }} ${{ github.event.inputs.branchName && format('{0}', github.event.inputs.branchName) }} ${{ github.event.inputs.subdir && format('[/{0}]', github.event.inputs.subdir) }} :${{ github.event.inputs.taskName }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 统一Android SDK路径，官方actions会自动写入
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  # 固定Gradle版本，适配老项目
  GRADLE_VERSION: 5.6.4

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "https://github.com/Pugatw/stc89c52_isp/"
        required: true
        default: "https://github.com/Pugatw/stc89c52_isp/"
      branchName:
        description: "Git branch name [Optional]"
        required: false
        default: "main"
      subdir:
        description: "Relative subdirectory path when the project is nested [Optional]"
        required: false
        default: ""
      jdkVersion:
        description: "OpenJDK version: 8（必须填8，老项目仅兼容8）"
        required: false
        default: "8"
      taskName:
        description: "build.gradle task name: assembleDebug（推荐）/ assembleRelease"
        required: false
        default: "assembleDebug"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（官方actions比手动git clone更稳定）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository }}
          ref: ${{ github.event.inputs.branchName || 'main' }}
          submodules: recursive
          path: workspace

      # 2. 安装JDK 8（严格匹配老项目要求）
      - name: Setup JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ github.event.inputs.jdkVersion }}
          java-package: jdk
          architecture: x64

      # 3. 安装Android SDK（官方工具，一键搞定，彻底解决路径问题）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # 适配stc89c52_isp老项目的SDK版本
          android-version: 29
          build-tools-version: 29.0.3
          ndk-version: "" # 老项目不需要NDK，留空避免冲突

      # 4. 生成Gradle Wrapper（彻底解决gradlew找不到的问题）
      - name: Generate Gradle Wrapper
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          # 用官方Gradle wrapper工具，无需全局gradle
          if [ ! -f "gradlew" ]; then
            echo "生成Gradle $GRADLE_VERSION Wrapper..."
            # 下载官方wrapper脚本，生成gradlew
            wget -O gradlew https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-wrapper.jar
            echo '#!/bin/sh' > gradlew
            echo 'exec java -jar "$0" "$@"' >> gradlew
            chmod +x gradlew
            # 生成完整wrapper配置
            ./gradlew wrapper --gradle-version $GRADLE_VERSION --distribution-type all
          fi
          # 确保权限正确
          chmod +x gradlew
          # 验证文件存在
          ls -la gradlew

      # 5. 构建APK（Debug/Release双支持）
      - name: Build APK
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [[ "${{ github.event.inputs.taskName }}" == *Release* ]]; then
            echo "构建Release版，自动生成debug keystore签名..."
            if [ ! -f "$HOME/.android/debug.keystore" ]; then
              keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
              mkdir -p $HOME/.android
              mv debug.keystore $HOME/.android/debug.keystore
            fi
            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android \
              -Pandroid.buildToolsVersion=29.0.3 \
              -Pandroid.compileSdkVersion=29 \
              --stacktrace
          else
            echo "构建Debug版APK..."
            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.buildToolsVersion=29.0.3 \
              -Pandroid.compileSdkVersion=29 \
              --stacktrace
          fi

      # 6. 上传APK产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          path: |
            workspace/${{ github.event.inputs.subdir }}/**/*.apk
          name: stc89c52_isp-apk
          retention-days: 3
