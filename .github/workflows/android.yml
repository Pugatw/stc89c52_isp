name: Build Android APK for stc89c52_isp
run-name: ${{ github.event.inputs.repository }} ${{ github.event.inputs.branchName && format('{0}', github.event.inputs.branchName) }} ${{ github.event.inputs.subdir && format('[/{0}]', github.event.inputs.subdir) }} :${{ github.event.inputs.taskName }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  # 🔒 严格锁定Gradle版本，绝对不能改！适配老项目+JDK8
  GRADLE_VERSION: 5.6.4
  GRADLE_WRAPPER_URL: https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-all.zip

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Pugatw/stc89c52_isp"
        required: true
        default: "Pugatw/stc89c52_isp"
      branchName:
        description: "Git分支名（可选，默认main）"
        required: false
        default: "main"
      subdir:
        description: "项目嵌套子目录（可选，根目录留空）"
        required: false
        default: ""
      jdkVersion:
        description: "OpenJDK版本：8（老项目仅兼容8，绝对不能改）"
        required: false
        default: "8"
      taskName:
        description: "构建任务：assembleDebug（推荐）/ assembleRelease"
        required: false
        default: "assembleDebug"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository }}
          ref: ${{ github.event.inputs.branchName || 'main' }}
          submodules: recursive
          path: workspace

      # 2. 安装JDK 8（严格锁定，适配Gradle 5.6.4）
      - name: Setup JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ github.event.inputs.jdkVersion }}
          java-package: jdk
          architecture: x64

      # 3. 安装Android SDK（官方工具，稳定可靠）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          android-version: 29
          build-tools-version: 29.0.3
          ndk-version: ""

      # 4. 🔧 彻底修复：手动部署Gradle 5.6.4，100%锁定版本
      - name: Setup Gradle 5.6.4 (严格适配JDK8)
        run: |
          # 下载并解压Gradle 5.6.4
          wget $GRADLE_WRAPPER_URL -O gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          # 配置环境变量
          echo "PATH=/opt/gradle/gradle-$GRADLE_VERSION/bin:$PATH" >> $GITHUB_ENV
          # 验证版本
          gradle -v

      # 5. 生成正确的Gradle Wrapper（绝对不会升级版本）
      - name: Generate Correct Gradle Wrapper
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          # 用本地安装的Gradle 5.6.4生成wrapper，彻底锁定版本
          gradle wrapper --gradle-version $GRADLE_VERSION --distribution-type all
          # 赋予执行权限
          chmod +x gradlew
          # 验证版本
          ./gradlew -v

      # 6. 构建APK
      - name: Build APK
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [[ "${{ github.event.inputs.taskName }}" == *Release* ]]; then
            echo "构建Release版，自动生成debug keystore签名..."
            if [ ! -f "$HOME/.android/debug.keystore" ]; then
              keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
              mkdir -p $HOME/.android
              mv debug.keystore $HOME/.android/debug.keystore
            fi
            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android \
              -Pandroid.buildToolsVersion=29.0.3 \
              -Pandroid.compileSdkVersion=29 \
              --stacktrace
          else
            echo "构建Debug版APK..."
            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.buildToolsVersion=29.0.3 \
              -Pandroid.compileSdkVersion=29 \
              --stacktrace
          fi

      # 7. 上传APK产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          path: |
            workspace/${{ github.event.inputs.subdir }}/**/*.apk
          name: stc89c52_isp-apk
          retention-days: 3
