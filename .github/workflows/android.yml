# 工作流名称
name: Android CI

# 触发条件：推代码到main分支 / 手动触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 手动触发开关（关键！新手优先用这个）

# 构建任务
jobs:
  build:
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest

    steps:
      # 步骤1：拉取仓库代码
      - uses: actions/checkout@v4

      # 步骤2：配置JDK 11（适配这个老项目的Gradle版本）
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 步骤3：给gradlew添加可执行权限（避免权限报错）
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 步骤4：构建Debug版APK（核心！生成可安装的APK）
      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug

      # 步骤5：上传APK（编译成功后能下载）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stc89c52_isp-debug-apk
          path: app/build/outputs/apk/debug/*.apk
