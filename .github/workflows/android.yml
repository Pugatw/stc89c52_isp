jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android SDK
      run: |
        # 自动接受 SDK 许可证（忽略可能的 broken pipe 错误）
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        # 安装需要的 SDK 组件
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-29" "build-tools;29.0.3"

    - name: Prepare gradlew
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 6.7.1 --distribution-type all
        fi
        chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug -Pandroid.buildToolsVersion=29.0.3 -Pandroid.compileSdkVersion=29 --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: stc89c52_isp-debug-apk
        path: app/build/outputs/apk/debug/*.apk
